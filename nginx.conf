worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 10M;

  # Gzip
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

  upstream backend {
    server backend:3001;
  }

  # ── HTTP → HTTPS redirect (quando SSL estiver configurado) ────────────────
  # Descomente para forçar HTTPS:
  # server {
  #   listen 80;
  #   return 301 https://$host$request_uri;
  # }

  server {
    listen 80;
    # listen 443 ssl;
    # ssl_certificate /etc/nginx/ssl/cert.pem;
    # ssl_certificate_key /etc/nginx/ssl/key.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;

    # API — proxy para o backend
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;

      # CORS para extensão Chrome
      add_header Access-Control-Allow-Origin "*" always;
      add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS" always;
      add_header Access-Control-Allow-Headers "Content-Type,Authorization,X-API-Token" always;
      if ($request_method = OPTIONS) { return 204; }
    }

    # Rate limit extra para login
    location /api/auth/login {
      limit_req zone=login burst=5 nodelay;
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Uploads (arquivos públicos como logos)
    location /uploads/ {
      proxy_pass http://backend;
      proxy_cache_bypass $http_upgrade;
      expires 7d;
      add_header Cache-Control "public, immutable";
    }

    # Frontend — servido pelo backend (ou arquivos estáticos)
    location / {
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;

      # SPA routing
      proxy_intercept_errors on;
      error_page 404 = @frontend;
    }

    location @frontend {
      proxy_pass http://backend;
    }
  }
}
