# Overlay ativado automaticamente pelo install.sh quando HTTPS está habilitado.
# Não edite manualmente — use bash install.sh para reconfigurar.
services:
  nginx:
    ports:
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx-https.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - uploads_data:/app/uploads:ro
